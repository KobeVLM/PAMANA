# Server Configuration
server.port=8080

# Local PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/pamana
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration Secrets
# A secure 512-bit HS512 hex key for dev auth token validation
pamana.jwt.secret=9a67a86c6a3b83d1c41b8da2cf900407a51c911cf8d2e82e3f6db07c4b4dcd07e868846c4f0393b4e6d76efc2c4bf2f4e8b8ff701fa1c9f28d8b94cc82f5b5b5
